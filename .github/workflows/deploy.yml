name: deploy
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag to create and deploy, e.g. v1.2.0"
        required: true
        type: string

permissions:
  id-token: write
  contents: write   # push the release tag on workflow_dispatch

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Scopes the OIDC token's `sub` to repo:…:environment:production, which the
    # deploy role trusts — so a workflow_dispatch release from main can assume it
    # without trusting arbitrary main-branch runs. (Tag pushes are trusted too.)
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install deploy deps
        run: |
          pip install -r infra/requirements.txt
          npm install -g aws-cdk@2.1126.0
      - name: Resolve version
        id: ver
        # Pass GitHub context through env vars rather than interpolating ${{ }}
        # directly into the shell, so a crafted `version` input can't inject
        # commands into the run step (the case-glob below validates the format).
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # On a v* tag push the version is the tag; on manual dispatch it is the
          # `version` input (GITHUB_REF_NAME would be the branch, e.g. "main").
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VER="$INPUT_VERSION"
          else
            VER="${GITHUB_REF_NAME}"
          fi
          case "$VER" in
            v[0-9]*) ;;
            *) echo "::error::version must look like vX.Y.Z (got '$VER')"; exit 1 ;;
          esac
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "semver=$VER" >> "$GITHUB_OUTPUT"
      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2
      - name: CDK deploy (serving + ingest)
        env:
          ALLOWED_EMAIL: ${{ vars.ALLOWED_EMAIL }}
          # Optional: where ingest alarms are emailed. If the ALERT_EMAIL repo
          # variable is unset this is empty, and the stack falls back to
          # allowed_email (cfg.alert_email or cfg.allowed_email).
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
          GIT_SHA: ${{ steps.ver.outputs.sha }}
          SEMVER: ${{ steps.ver.outputs.semver }}
        run: |
          cd infra
          cdk deploy PepOracleProdStack PepOracleIngestStack \
            --require-approval never \
            -c "allowed_email=$ALLOWED_EMAIL" \
            -c "alert_email=$ALERT_EMAIL" \
            -c "git_sha=$GIT_SHA" \
            -c "semver=$SEMVER"
      - name: Smoke test
        run: python scripts/smoke.py
        env:
          PEP_ORACLE_SMOKE_URL: https://pep-oracle.iicapn.com
          EXPECT_SHA: ${{ steps.ver.outputs.sha }}
          EXPECT_SEMVER: ${{ steps.ver.outputs.semver }}
      - name: Tag release
        # Only on manual dispatch: stamp the verified, deployed commit with the
        # release tag (a tag pushed here by GITHUB_TOKEN does NOT re-trigger this
        # workflow, so there's no double deploy). Tag pushes already carry their tag.
        if: github.event_name == 'workflow_dispatch'
        env:
          VER: ${{ steps.ver.outputs.semver }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$VER" >/dev/null 2>&1; then
            echo "tag $VER already exists on origin — skipping (re-deploy of an existing version)"
          else
            # Annotated tags need a committer identity, which the runner lacks by default.
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$VER" -m "Release $VER"
            git push origin "refs/tags/$VER"
            echo "created and pushed tag $VER"
          fi
