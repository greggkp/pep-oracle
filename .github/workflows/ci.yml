name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -e ".[server,aws,dev]"
          pip install -r infra/requirements.txt
      - name: Ruff
        run: ruff check .
      - name: Pytest (root)
        run: pytest -q
      - name: Pytest (infra)
        run: cd infra && python -m pytest -q
      - name: CDK synth (all stacks)
        run: |
          npm install -g aws-cdk@2.1126.0
          cd infra && cdk synth --all -c allowed_email=ci@example.com > /dev/null
      - name: Docker build (serving + ingest images)
        run: |
          docker build -f Dockerfile -t pep-oracle:ci .
          docker build -f Dockerfile.ingest -t pep-oracle-ingest:ci .
