name: ci
on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only reads the repo (checkout) and needs no write scopes.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install root env (uv) + infra deps
        run: |
          python -m pip install --upgrade pip uv
          uv sync --extra server --extra aws --extra dev
          pip install -r infra/requirements.txt
      - name: Ruff Check
        run: uv run ruff check .
      - name: Ruff Format Check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy src
      - name: Pytest (root)
        run: uv run pytest -q
      - name: Pytest (infra)
        run: cd infra && python -m pytest -q
      - name: CDK synth (all stacks)
        run: |
          cd infra && npm ci && npx cdk synth '*' -c allowed_email=ci@example.com > /dev/null
      - name: Docker build (serving + ingest images)
        run: |
          docker build -f Dockerfile -t pep-oracle:ci .
          docker build -f Dockerfile.ingest -t pep-oracle-ingest:ci .
      - name: Run Trivy vulnerability scanner on serving image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'pep-oracle:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Run Trivy vulnerability scanner on ingest image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'pep-oracle-ingest:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
