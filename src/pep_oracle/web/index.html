<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEP Oracle</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px;
    color: #1a1a1a;
    background: #fafafa;
  }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 4px; }
  .coverage { color: #888; font-size: 0.8rem; margin-bottom: 24px; }
  form { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  input[type="text"] {
    flex: 1;
    min-width: 0;
    padding: 10px 12px;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
  }
  input[type="text"]:focus { border-color: #4a90d9; }
  button {
    padding: 10px 20px;
    font-size: 1rem;
    background: #4a90d9;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  button:hover { background: #3a7bc8; }
  button:disabled { background: #999; cursor: not-allowed; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; font-size: 0.85rem; }
  .controls label { display: flex; align-items: center; gap: 4px; }
  select {
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.85rem;
  }
  @media (max-width: 480px) {
    body { padding: 16px 12px; overflow-x: hidden; }
    form { flex-direction: column; }
    input[type="text"] { width: 100%; }
    button { width: 100%; }
  }
  #thread {
    display: none;
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 8px;
    max-height: 60vh;
    overflow-y: auto;
  }
  .bubble-row { display: flex; margin-bottom: 10px; }
  .bubble-row.user { justify-content: flex-end; }
  .bubble-row.assistant { justify-content: flex-start; }
  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    max-width: 80%;
    line-height: 1.6;
    word-wrap: break-word;
  }
  .bubble.user {
    background: #4a90d9;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .bubble.assistant {
    background: #f0f0f0;
    color: #1a1a1a;
    border-bottom-left-radius: 4px;
  }
  .bubble.assistant h1, .bubble.assistant h2, .bubble.assistant h3 { margin: 12px 0 6px; }
  .bubble.assistant p { margin-bottom: 8px; }
  .bubble.assistant ul, .bubble.assistant ol { margin-bottom: 8px; padding-left: 20px; }
  .bubble.assistant blockquote { border-left: 3px solid #ddd; padding-left: 10px; color: #555; margin-bottom: 8px; }
  .bubble.assistant code { background: #e0e0e0; padding: 2px 4px; border-radius: 3px; font-size: 0.9em; }
  #new-convo { display: none; text-align: center; margin-bottom: 24px; }
  #new-convo a {
    color: #4a90d9;
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: none;
    border-bottom: 1px dashed #4a90d9;
  }
  #new-convo a:hover { color: #3a7bc8; }
  .collapsed-thread {
    margin-bottom: 10px;
    padding: 8px 12px;
    background: #f5f5f5;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    opacity: 0.6;
    cursor: pointer;
    font-size: 0.82rem;
    color: #888;
  }
  .collapsed-thread:hover { opacity: 0.8; }
  .collapsed-thread .collapsed-body { display: none; margin-top: 8px; opacity: 0.7; }
  .collapsed-thread.expanded .collapsed-body { display: block; }
  .collapsed-resume {
    color: #4a90d9;
    cursor: pointer;
    font-size: 0.82rem;
    text-decoration: none;
    border-bottom: 1px dashed #4a90d9;
    margin-left: 6px;
  }
  .collapsed-resume:hover { color: #3a7bc8; }
  #topics { display: none; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .topic-chip {
    padding: 6px 14px;
    font-size: 0.85rem;
    background: #e8f0fe;
    color: #1a56db;
    border: 1px solid #c3d9f7;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
  }
  .topic-chip:hover { background: #d0e2fc; }
  .topic-chip.not-ingested {
    background: #fff3e0;
    color: #b45309;
    border-color: #fbbf24;
    opacity: 0.75;
  }
  .topic-chip.not-ingested:hover { background: #fee2b3; }
  .topic-chip.used {
    opacity: 0.6;
    background: #f0f0f0;
    color: #6b7280;
    border-color: #d1d5db;
  }
  .topic-chip.used:hover { background: #e5e5e5; }
  #ingest-banner {
    display: none;
    background: #fffbeb;
    border: 1px solid #fbbf24;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 0.85rem;
    color: #92400e;
    align-items: center;
    gap: 10px;
  }
  #ingest-banner .ingest-text { flex: 1; }
  #ingest-banner button {
    padding: 6px 14px;
    font-size: 0.82rem;
    background: #f59e0b;
    border-radius: 6px;
  }
  #ingest-banner button:hover { background: #d97706; }
  #ingest-banner .ingest-progress {
    font-style: italic;
    color: #b45309;
  }
  footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e0e0e0; font-size: 0.8rem; color: #888; }
  .updating-hint {
    font-size: 0.8rem;
    color: #999;
    font-style: italic;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
  <h1>PEP Oracle</h1>
  <p class="subtitle">Ask questions about the PEP with Chas and Dr Dave podcast</p>
  <p class="coverage" id="coverage">Loading...</p>
  <div id="topics"></div>
  <div id="topics-updating" class="updating-hint" style="display:none">Updating topics...</div>
  <div id="ingest-banner">
    <span class="ingest-text"></span>
    <button id="ingest-btn" type="button">Ingest now</button>
  </div>

  <form id="ask-form">
    <input type="text" id="question" placeholder="What have Chas and Dave said about...?" autofocus>
    <button type="submit" id="submit-btn">Ask</button>
  </form>
  <div class="controls">
    <label>Chunks: <select id="top-k">
      <option value="5">5</option>
      <option value="10" selected>10</option>
      <option value="20">20</option>
    </select></label>
  </div>

  <div id="collapsed-area"></div>
  <div id="thread"></div>
  <div id="new-convo"><a id="new-convo-btn">+ New conversation</a></div>
  <footer id="status-bar">Loading status...</footer>

<script>
  const form = document.getElementById("ask-form");
  const questionEl = document.getElementById("question");
  const submitBtn = document.getElementById("submit-btn");
  const topK = document.getElementById("top-k");
  const statusBar = document.getElementById("status-bar");
  const coverageEl = document.getElementById("coverage");
  const threadEl = document.getElementById("thread");
  const newConvoEl = document.getElementById("new-convo");
  const newConvoBtn = document.getElementById("new-convo-btn");
  const collapsedArea = document.getElementById("collapsed-area");
  const topicsEl = document.getElementById("topics");
  const ingestBanner = document.getElementById("ingest-banner");
  const ingestBannerText = ingestBanner.querySelector(".ingest-text");
  const ingestBtn = document.getElementById("ingest-btn");

  let conversationHistory = [];
  let notIngestedEpisodes = [];
  let collapsedThreads = [];
  let lastUpdated = { topics: null, status: null, episodes: null };
  let freshnessTimer = null;

  function addBubble(role, content) {
    const row = document.createElement("div");
    row.className = "bubble-row " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble " + role;
    if (role === "assistant") {
      /* marked.parse renders trusted server markdown — server controls the content */
      bubble.innerHTML = marked.parse(content);
    } else {
      bubble.textContent = content;
    }
    row.appendChild(bubble);
    threadEl.appendChild(row);
    threadEl.scrollTop = threadEl.scrollHeight;
    return bubble;
  }

  function updateUIState() {
    const active = conversationHistory.length > 0;
    threadEl.style.display = active ? "block" : "none";
    newConvoEl.style.display = active ? "block" : "none";
    topicsEl.style.display = active ? "none" : topicsEl.dataset.loaded ? "flex" : "none";
    questionEl.placeholder = active ? "Ask a follow-up..." : "What have Chas and Dave said about...?";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = questionEl.value.trim();
    if (!question) return;

    questionEl.value = "";
    conversationHistory.push({ role: "user", content: question });
    addBubble("user", question);
    const pendingBubble = addBubble("assistant", "");
    pendingBubble.textContent = "Thinking...";
    pendingBubble.style.fontStyle = "italic";
    pendingBubble.style.color = "#888";
    submitBtn.disabled = true;
    updateUIState();

    try {
      const body = {
        question,
        top_k: parseInt(topK.value),
        history: conversationHistory.slice(0, -1),
      };

      const resp = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const data = await resp.json();

      conversationHistory.push({ role: "assistant", content: data.answer });
      pendingBubble.style.fontStyle = "";
      pendingBubble.style.color = "";
      /* marked.parse renders trusted server markdown — server controls the content */
      pendingBubble.innerHTML = marked.parse(data.answer);
      threadEl.scrollTop = threadEl.scrollHeight;
    } catch (err) {
      pendingBubble.textContent = "Error: " + err.message;
      pendingBubble.style.color = "#c0392b";
      pendingBubble.style.fontStyle = "";
      // Remove the user message from history since the request failed
      conversationHistory.pop();
    } finally {
      submitBtn.disabled = false;
      questionEl.focus();
    }
  });

  newConvoBtn.addEventListener("click", () => {
    if (conversationHistory.length === 0) return;

    const firstUserMsg = conversationHistory.find(m => m.role === "user");
    const msgCount = conversationHistory.filter(m => m.role === "user").length;
    collapsedThreads.push({
      label: firstUserMsg ? firstUserMsg.content : "Conversation",
      count: msgCount,
      messages: [...conversationHistory],
    });

    renderCollapsed();
    conversationHistory = [];
    threadEl.innerHTML = "";
    updateUIState();
    questionEl.focus();
  });

  function renderCollapsed() {
    collapsedArea.innerHTML = "";
    collapsedThreads.forEach((thread, idx) => {
      const div = document.createElement("div");
      div.className = "collapsed-thread";
      const label = thread.label.length > 60 ? thread.label.slice(0, 60) + "..." : thread.label;

      const header = document.createElement("span");
      const arrow = document.createElement("span");
      arrow.className = "collapsed-arrow";
      arrow.textContent = "\u25b6";
      header.appendChild(arrow);
      header.appendChild(document.createTextNode(" Previous: " + label + " "));

      const count = document.createElement("span");
      count.style.color = "#aaa";
      count.textContent = "(" + thread.count + " question" + (thread.count !== 1 ? "s" : "") + ")";
      header.appendChild(count);

      const resume = document.createElement("a");
      resume.textContent = "Resume";
      resume.className = "collapsed-resume";
      resume.addEventListener("click", (e) => {
        e.stopPropagation();
        resumeThread(idx);
      });
      header.appendChild(document.createTextNode(" "));
      header.appendChild(resume);
      div.appendChild(header);

      const body = document.createElement("div");
      body.className = "collapsed-body";
      thread.messages.forEach(msg => {
        const row = document.createElement("div");
        row.className = "bubble-row " + msg.role;
        const bubble = document.createElement("div");
        bubble.className = "bubble " + msg.role;
        if (msg.role === "assistant") {
          /* marked.parse renders trusted server markdown — server controls the content */
          bubble.innerHTML = marked.parse(msg.content);
        } else {
          bubble.textContent = msg.content;
        }
        row.appendChild(bubble);
        body.appendChild(row);
      });
      div.appendChild(body);

      div.addEventListener("click", () => {
        div.classList.toggle("expanded");
        arrow.textContent = div.classList.contains("expanded") ? "\u25bc" : "\u25b6";
      });

      collapsedArea.appendChild(div);
    });
  }

  function resumeThread(idx) {
    if (submitBtn.disabled) return; // request in flight

    // Capture thread reference before mutating the array
    const thread = collapsedThreads[idx];

    // If there's an active conversation, collapse it first
    if (conversationHistory.length > 0) {
      const firstUserMsg = conversationHistory.find(m => m.role === "user");
      const msgCount = conversationHistory.filter(m => m.role === "user").length;
      collapsedThreads.push({
        label: firstUserMsg ? firstUserMsg.content : "Conversation",
        count: msgCount,
        messages: [...conversationHistory],
      });
    }

    // Restore the selected thread
    conversationHistory = [...thread.messages];
    collapsedThreads.splice(collapsedThreads.indexOf(thread), 1);

    // Re-render: clear thread, re-add each message via addBubble
    threadEl.innerHTML = "";  /* safe: clearing children, matches newConvoBtn pattern */
    conversationHistory.forEach(msg => addBubble(msg.role, msg.content));
    renderCollapsed();
    updateUIState();
    questionEl.focus();
  }

  async function loadStatus() {
    try {
      const resp = await fetch("/status");
      const s = await resp.json();
      if (s.ingested_count == null) return;  // cache not yet populated
      const sizeMB = (s.db_size_bytes / 1_000_000).toFixed(1);
      const countPrefix = s.feed_count != null
        ? s.ingested_count + "/" + s.feed_count
        : s.ingested_count;
      statusBar.textContent = countPrefix +
        " episodes ingested | " + s.chunk_count + " excerpts | " + sizeMB + " MB";

      if (s.ingested_count === 0) {
        coverageEl.textContent = "No episodes ingested yet";
      } else if (s.earliest_episode && s.latest_episode && s.earliest_date && s.latest_date) {
        const fmtDate = (d) => {
          const dt = new Date(d + "T00:00:00");
          return dt.toLocaleDateString("en-US", { month: "short", year: "numeric" });
        };
        coverageEl.textContent = s.ingested_count + " episodes ingested (Ep " +
          s.earliest_episode + "\u2013" + s.latest_episode + ", " +
          fmtDate(s.earliest_date) + " \u2013 " + fmtDate(s.latest_date) + ")";
      } else {
        coverageEl.textContent = s.ingested_count + " episodes ingested";
      }
    } catch (err) {
      statusBar.textContent = "Could not load status";
      coverageEl.textContent = "";
    }
  }

  let topicPool = [];

  function createChip(t, isNew) {
    const chip = document.createElement("button");
    chip.className = "topic-chip" + (isNew ? " not-ingested" : "");
    chip.textContent = t.topic;
    chip.title = isNew
      ? "Ep " + t.episode_number + " (not yet ingested)"
      : "Ep " + t.episode_number;
    chip.dataset.episode = t.episode_number;
    chip.addEventListener("click", () => {
      questionEl.value = t.question;
      questionEl.focus();
      if (!chip.classList.contains("used")) {
        chip.classList.add("used");
        // Append a fresh chip from the pool if available
        if (topicPool.length > 0) {
          const next = topicPool.shift();
          const nextIsNew = notIngestedEpisodes.includes(next.episode_number);
          topicsEl.appendChild(createChip(next, nextIsNew));
        }
      }
    });
    return chip;
  }

  function renderTopics(data) {
    if (!data || !data.topics || data.topics.length === 0) return;

    notIngestedEpisodes = data.not_ingested_episodes || [];
    topicPool = data.pool ? data.pool.slice() : [];

    // Clear existing chips and re-render
    topicsEl.innerHTML = "";
    data.topics.forEach(t => {
      const isNew = notIngestedEpisodes.includes(t.episode_number);
      topicsEl.appendChild(createChip(t, isNew));
    });
    topicsEl.dataset.loaded = "true";
    if (conversationHistory.length === 0) {
      topicsEl.style.display = "flex";
    }

    if (notIngestedEpisodes.length > 0) {
      const epList = notIngestedEpisodes.join(", ");
      const label = notIngestedEpisodes.length === 1 ? "Episode" : "Episodes";
      ingestBannerText.textContent = label + " " + epList +
        " available but not yet ingested.";
      ingestBanner.style.display = "flex";
    } else {
      ingestBanner.style.display = "none";
    }
  }

  async function loadTopics() {
    try {
      const resp = await fetch("/topics");
      if (!resp.ok) return;
      const data = await resp.json();
      renderTopics(data);
      document.getElementById("topics-updating").style.display = "none";
    } catch (e) {
      // Silent failure — topics are optional
    }
  }

  ingestBtn.addEventListener("click", async () => {
    ingestBtn.disabled = true;
    ingestBtn.textContent = "Starting...";
    try {
      const resp = await fetch("/ingest", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ force: false, episode_numbers: notIngestedEpisodes, diarize: true }),
      });
      const data = await resp.json();
      if (data.status === "already_running" || data.status === "started") {
        ingestBtn.style.display = "none";
        const progress = document.createElement("span");
        progress.className = "ingest-progress";
        progress.textContent = "Ingesting\u2026";
        ingestBannerText.appendChild(document.createTextNode(" "));
        ingestBannerText.appendChild(progress);
        pollIngestion();
        startFreshnessPolling();
      }
    } catch (e) {
      ingestBtn.disabled = false;
      ingestBtn.textContent = "Ingest now";
    }
  });

  function pollIngestion() {
    const timer = setInterval(async () => {
      try {
        const resp = await fetch("/ingest/status");
        const data = await resp.json();
        if (!data.running) {
          clearInterval(timer);
          if (data.last_result && data.last_result.error) {
            ingestBannerText.textContent = "Ingestion failed: " + data.last_result.error;
            ingestBtn.style.display = "";
            ingestBtn.disabled = false;
            ingestBtn.textContent = "Retry";
          } else {
            ingestBanner.style.display = "none";
            // Remove not-ingested styling from chips
            topicsEl.querySelectorAll(".topic-chip.not-ingested").forEach(chip => {
              chip.classList.remove("not-ingested");
              chip.title = chip.title.replace(" (not yet ingested)", "");
            });
            notIngestedEpisodes = [];
            // Refresh status bar and pick up cache-refreshed data
            loadStatus();
            startFreshnessPolling();
          }
        } else {
          // Show progress detail
          let progressText = "Ingesting\u2026";
          if (data.current_episode) {
            const total = data.episodes_total || "?";
            const done = (data.episodes_done || 0) + 1;
            progressText = "Ingesting " + data.current_episode + " (" + done + "/" + total + ")";
            if (data.step && data.step !== "starting") {
              progressText += ": " + data.step;
            }
          }
          ingestBannerText.textContent = progressText;
        }
      } catch (e) {
        // keep polling
      }
    }, 3000);
  }

  function startFreshnessPolling() {
    if (freshnessTimer) return;
    freshnessTimer = setInterval(async () => {
      try {
        const resp = await fetch("/freshness");
        const data = await resp.json();
        let anyStale = false;
        const fetches = [];

        for (const key of ["topics", "status", "episodes"]) {
          if (data[key].stale) {
            anyStale = true;
          }
          if (data[key].updated_at && data[key].updated_at !== lastUpdated[key]) {
            lastUpdated[key] = data[key].updated_at;
            if (key === "topics") fetches.push(loadTopics());
            if (key === "status") fetches.push(loadStatus());
          }
        }

        await Promise.all(fetches);

        if (!anyStale) {
          clearInterval(freshnessTimer);
          freshnessTimer = null;
        }
      } catch (e) {
        // keep polling
      }
    }, 5000);
  }

  document.getElementById("topics-updating").style.display = "block";
  loadStatus();
  loadTopics();

  // Check if ingestion is already running (e.g., page was refreshed)
  async function checkIngestionOnLoad() {
    try {
      const resp = await fetch("/ingest/status");
      const data = await resp.json();
      if (data.running) {
        ingestBtn.style.display = "none";
        ingestBanner.style.display = "flex";
        ingestBannerText.textContent = "Ingesting\u2026";
        pollIngestion();
      }
    } catch (e) {
      // silent
    }
  }
  checkIngestionOnLoad();
  startFreshnessPolling();
</script>
</body>
</html>
